function _renderForecastSimon(el, curM, curWk) {
  // ── Next 3 months forward ────────────────────────────────────────────────
  var fwdMos = [];
  var now = new Date();
  for (var i = 0; i < 3; i++) {
    var d = new Date(now.getFullYear(), now.getMonth()+i, 1);
    fwdMos.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));
  }

  var repName = STATE.user; // Simon
  var tv = function(v){ return '\u00a3'+Math.round(v).toLocaleString(); };

  // ── KPI tiles data ───────────────────────────────────────────────────────
  // Annual KPI: Simon Wholesaler + Retailer + Distributor + STB
  var annKpiWS   = KPI_ANNUAL['Simon_Wholesaler'] || 0;
  var annKpiRet  = KPI_ANNUAL['Simon_Retailer']   || 0;
  var annKpiDist = KPI_ANNUAL['Simon_Distributor']|| 0;
  var annKpiTotal = annKpiWS + annKpiRet + annKpiDist; // STB excluded from tiles

  // Monthly KPI this month
  var moKpiWS   = kpiForMonth('Simon_Wholesaler', curM);
  var moKpiRet  = kpiForMonth('Simon_Retailer',   curM);
  var moKpiDist = kpiForMonth('Simon_Distributor',curM);
  var moKpiTotal = moKpiWS + moKpiRet + moKpiDist; // STB excluded

  // YTD actuals
  var myBranchRecs = STATE.branches.filter(function(b){return b['Humax Sales Rep']==='Simon';});
  var allMonths = getRelevantMonths(12).filter(function(mo){return mo<=curM;});

  // Wholesaler YTD (branch POs, EV only)
  var wsYtdQty = allMonths.reduce(function(s,mo){
    return s + myBranchRecs.reduce(function(ss,r){
      var lines = ((r._qty||{})[mo]||{}).lines || [];
      return ss + lines.filter(function(l){return EV_MODELS.indexOf(l.model)>=0;}).reduce(function(ss2,l){return ss2+Number(l.order||0);},0);
    },0);
  },0);
  var wsYtdTo = allMonths.reduce(function(s,mo){
    return s + myBranchRecs.reduce(function(ss,r){
      var lines = ((r._qty||{})[mo]||{}).lines || [];
      return ss + lines.filter(function(l){return EV_MODELS.indexOf(l.model)>=0;}).reduce(function(ss2,l){return ss2+Number(l.order||0)*priceOf(l.model);},0);
    },0);
  },0);

  // Retailer YTD
  var retYtdQty=0, retYtdTo=0;
  ['retailer'].forEach(function(ch){
    CHANNEL_CONFIG[ch].accounts.forEach(function(a){
      var r=channelYTD(ch,a.key,curM); retYtdQty+=r.qty; retYtdTo+=r.to;
    });
  });

  // Distributor YTD
  var distYtdQty=0, distYtdTo=0;
  ['distributor'].forEach(function(ch){
    CHANNEL_CONFIG[ch].accounts.forEach(function(a){
      var r=channelYTD(ch,a.key,curM); distYtdQty+=r.qty; distYtdTo+=r.to;
    });
  });

  // STB YTD
  var ytdQtyTotal = wsYtdQty+retYtdQty+distYtdQty; // STB excluded
  var ytdToTotal  = wsYtdTo+retYtdTo+distYtdTo;
  var ytdPct = annKpiTotal ? Math.min(999,Math.round(ytdQtyTotal/annKpiTotal*100)) : 0;
  var ytdCol = ytdPct>=100?'var(--green)':ytdPct>=60?'var(--orange)':'var(--red)';

  // MTD actuals
  var wsMtdQty = myBranchRecs.reduce(function(s,r){
    var lines = ((r._qty||{})[curM]||{}).lines || [];
    return s + lines.filter(function(l){return EV_MODELS.indexOf(l.model)>=0;}).reduce(function(ss,l){return ss+Number(l.order||0);},0);
  },0);
  var wsMtdTo = myBranchRecs.reduce(function(s,r){
    var lines = ((r._qty||{})[curM]||{}).lines || [];
    return s + lines.filter(function(l){return EV_MODELS.indexOf(l.model)>=0;}).reduce(function(ss,l){return ss+Number(l.order||0)*priceOf(l.model);},0);
  },0);

  var retMtdQty=0,retMtdTo=0;
  CHANNEL_CONFIG.retailer.accounts.forEach(function(a){var r=channelMTD('retailer',a.key,curM);retMtdQty+=r.qty;retMtdTo+=r.to;});
  var distMtdQty=0,distMtdTo=0;
  CHANNEL_CONFIG.distributor.accounts.forEach(function(a){var r=channelMTD('distributor',a.key,curM);distMtdQty+=r.qty;distMtdTo+=r.to;});
  var mtdQtyTotal = wsMtdQty+retMtdQty+distMtdQty; // STB excluded
  var mtdToTotal  = wsMtdTo+retMtdTo+distMtdTo;
  var mtdPct = moKpiTotal ? Math.min(999,Math.round(mtdQtyTotal/moKpiTotal*100)) : 0;
  var mtdCol = mtdPct>=100?'var(--green)':mtdPct>=60?'var(--orange)':'var(--red)';

  // This week
  var wkEV = 0;
  myBranchRecs.forEach(function(r){ wkEV += Number(((r._qty||{})[curM]||{}).order||0); }); // approx
  var wkCh = 0, wkChTo = 0;
  ['retailer','distributor','stb'].forEach(function(ch){
    CHANNEL_CONFIG[ch].accounts.forEach(function(a){
      var r=channelThisWeek(ch,a.key); wkCh+=r.qty; wkChTo+=r.to;
    });
  });
  // Better: use actual week channel data
  var wkRetQty=0,wkRetTo=0;
  CHANNEL_CONFIG.retailer.accounts.forEach(function(a){var r=channelThisWeek('retailer',a.key);wkRetQty+=r.qty;wkRetTo+=r.to;});
  var wkDistQty=0,wkDistTo=0;
  CHANNEL_CONFIG.distributor.accounts.forEach(function(a){var r=channelThisWeek('distributor',a.key);wkDistQty+=r.qty;wkDistTo+=r.to;});
  var wkStbQty=0,wkStbTo=0;
  CHANNEL_CONFIG.stb.accounts.forEach(function(a){var r=channelThisWeek('stb',a.key);wkStbQty+=r.qty;wkStbTo+=r.to;});
  var wkTotal = wkRetQty+wkDistQty+wkStbQty;
  var wkToTotal = wkRetTo+wkDistTo+wkStbTo;

  // ── Wholesaler FCST branches ─────────────────────────────────────────────
  function wsBranchFcstRows() {
    var rows = '';
    var hasFcst = false;
    fwdMos.forEach(function(ym) {
      var brWithFcst = myBranchRecs.filter(function(b){return Number(((b._qty||{})[ym]||{}).fcst||0)>0;});
      if (brWithFcst.length === 0) return;
      hasFcst = true;
      rows += '<div style="margin-bottom:12px"><div style="font-size:12px;font-weight:700;color:var(--teal);margin-bottom:6px">'+monthLabel(ym)+'</div>';
      rows += '<table style="width:100%;border-collapse:collapse"><thead><tr>'
        +'<th style="text-align:left;padding:5px 10px;font-size:11px;color:var(--muted)">Branch</th>'
        +'<th style="text-align:center;padding:5px 10px;font-size:11px;color:var(--orange)">FCST Qty</th>'
        +'<th style="text-align:center;padding:5px 10px;font-size:11px;color:var(--green)">Order Qty</th>'
        +'<th style="text-align:right;padding:5px 10px;font-size:11px;color:var(--teal)">Turnover</th>'
        +'</tr></thead><tbody>';
      var totF=0,totO=0,totTo=0;
      brWithFcst.forEach(function(b){
        var q=(b._qty||{})[ym]||{};
        var fcst=Number(q.fcst||0),order=Number(q.order||0);
        var to=((q.lines||[]).reduce(function(s,l){return s+Number(l.order||0)*priceOf(l.model||'');},0));
        totF+=fcst; totO+=order; totTo+=to;
        rows += '<tr style="border-bottom:1px solid var(--border)">'
          +'<td style="padding:5px 10px;font-size:12px"><strong>'+(b['Branch']||'—')+'</strong></td>'
          +'<td style="text-align:center;padding:5px 10px;font-family:DM Mono,monospace;font-size:12px;color:var(--orange)">'+fcst.toLocaleString()+'</td>'
          +'<td style="text-align:center;padding:5px 10px;font-family:DM Mono,monospace;font-size:12px;color:var(--green)">'+(order>0?order.toLocaleString():'—')+'</td>'
          +'<td style="text-align:right;padding:5px 10px;font-family:DM Mono,monospace;font-size:12px;color:var(--teal)">'+(to>0?tv(to):'—')+'</td>'
          +'</tr>';
      });
      rows += '<tr style="background:rgba(0,197,163,.06);font-weight:700">'
        +'<td style="padding:5px 10px;font-size:11px">Total</td>'
        +'<td style="text-align:center;padding:5px 10px;font-family:DM Mono,monospace;color:var(--orange)">'+totF.toLocaleString()+'</td>'
        +'<td style="text-align:center;padding:5px 10px;font-family:DM Mono,monospace;color:var(--green)">'+totO.toLocaleString()+'</td>'
        +'<td style="text-align:right;padding:5px 10px;font-family:DM Mono,monospace;color:var(--teal)">'+tv(totTo)+'</td>'
        +'</tr>';
      rows += '</tbody></table></div>';
    });
    if (!hasFcst) rows = '<div class="empty-state"><div class="icon">\ud83d\udce6</div><p>No branch FCST entered. Go to Wholesaler \u2192 Edit branch to add FCST.</p></div>';
    return rows;
  }

  // ── Channel FCST (Retailer + Distributor) ────────────────────────────────
  function channelFcstRows() {
    var out = '';
    fwdMos.forEach(function(ym) {
      var isCur = (ym === curM);
      var chData = [];
      // Retailer
      CHANNEL_CONFIG.retailer.accounts.forEach(function(a){
        var fc = getChannelFcst('retailer',ym,a.key);
        if (fc.qty > 0) chData.push({ label:a.label, color:a.color, qty:fc.qty, to:fc.to });
      });
      // Distributor
      CHANNEL_CONFIG.distributor.accounts.forEach(function(a){
        var fc = getChannelFcst('distributor',ym,a.key);
        if (fc.qty > 0) chData.push({ label:a.label, color:a.color, qty:fc.qty, to:fc.to });
      });
      if (chData.length === 0) return;
      out += '<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:700;color:'+(isCur?'var(--teal)':'var(--text)')+';margin-bottom:6px">'+monthLabel(ym)+(isCur?' \u2605':'')+'</div>';
      out += '<table style="width:100%;border-collapse:collapse"><tbody>';
      chData.forEach(function(c){
        out += '<tr style="border-bottom:1px solid var(--border)">'
          +'<td style="padding:5px 10px;font-size:12px;color:'+c.color+'"><strong>'+c.label+'</strong></td>'
          +'<td style="text-align:center;padding:5px 10px;font-family:DM Mono,monospace;font-size:12px;color:var(--orange)">'+c.qty.toLocaleString()+'</td>'
          +'<td style="text-align:right;padding:5px 10px;font-family:DM Mono,monospace;font-size:12px;color:var(--teal)">'+tv(c.to)+'</td>'
          +'</tr>';
      });
      out += '</tbody></table></div>';
    });
    if (!out) out = '<div style="font-size:12px;color:var(--muted);padding:8px 0">No FCST entered. Go to Retailer or Distributor tab to add 3-month FCST.</div>';
    return out;
  }

  // ── Monthly FCST totals (Wholesaler + Retailer + Distributor) ───────────
  function monthlyTotals() {
    var rows = fwdMos.map(function(ym) {
      // Wholesaler FCST
      var wsFcst = myBranchRecs.reduce(function(s,b){return s+Number(((b._qty||{})[ym]||{}).fcst||0);},0);
      // Retailer FCST
      var retFcst = 0;
      CHANNEL_CONFIG.retailer.accounts.forEach(function(a){retFcst+=getChannelFcst('retailer',ym,a.key).qty;});
      // Distributor FCST
      var distFcst = 0;
      CHANNEL_CONFIG.distributor.accounts.forEach(function(a){distFcst+=getChannelFcst('distributor',ym,a.key).qty;});
      var total = wsFcst+retFcst+distFcst;
      return { ym:ym, wsFcst:wsFcst, retFcst:retFcst, distFcst:distFcst, total:total };
    });
    var h = '<table style="width:100%;border-collapse:collapse"><thead><tr>'
      +'<th style="text-align:left;padding:7px 12px;font-size:11px;color:var(--muted)">Channel</th>'
      +fwdMos.map(function(ym){return '<th style="text-align:center;padding:7px 12px;font-size:11px;color:var(--muted)">'+monthLabel(ym)+'</th>';}).join('')
      +'</tr></thead><tbody>';
    h += '<tr style="border-bottom:1px solid var(--border)">'
      +'<td style="padding:7px 12px;font-size:12px;color:var(--simon)">\ud83c\udfe2 Wholesaler</td>'
      +rows.map(function(r){return '<td style="text-align:center;padding:7px 12px;font-family:DM Mono,monospace;font-size:12px;color:var(--orange)">'+(r.wsFcst>0?r.wsFcst.toLocaleString():'—')+'</td>';}).join('')+'</tr>';
    h += '<tr style="border-bottom:1px solid var(--border)">'
      +'<td style="padding:7px 12px;font-size:12px;color:var(--orange)">\ud83d\uded2 Retailer</td>'
      +rows.map(function(r){return '<td style="text-align:center;padding:7px 12px;font-family:DM Mono,monospace;font-size:12px;color:var(--orange)">'+(r.retFcst>0?r.retFcst.toLocaleString():'—')+'</td>';}).join('')+'</tr>';
    h += '<tr style="border-bottom:1px solid var(--border)">'
      +'<td style="padding:7px 12px;font-size:12px;color:var(--green)">\ud83d\udce6 Distributor</td>'
      +rows.map(function(r){return '<td style="text-align:center;padding:7px 12px;font-family:DM Mono,monospace;font-size:12px;color:var(--green)">'+(r.distFcst>0?r.distFcst.toLocaleString():'—')+'</td>';}).join('')+'</tr>';
    h += '<tr style="background:rgba(0,197,163,.08);font-weight:700">'
      +'<td style="padding:7px 12px;font-size:12px;color:var(--teal)">Total FCST</td>'
      +rows.map(function(r){return '<td style="text-align:center;padding:7px 12px;font-family:DM Mono,monospace;font-size:14px;font-weight:700;color:var(--teal)">'+r.total.toLocaleString()+'</td>';}).join('')+'</tr>';
    h += '</tbody></table>';
    return h;
  }

  // ── Build page HTML ──────────────────────────────────────────────────────
  el.innerHTML = '<div class="page-title">\ud83d\udce6 My Forecast</div>'
    +'<div class="page-sub">Next 3 months \u00b7 Wholesaler + Retailer + Distributor \u00b7 Simon</div>'

    // Total Monthly FCST — top of page
    +'<div class="card" style="margin-bottom:18px">'
    +'<div class="card-title">\ud83d\udcca Total Monthly FCST</div>'
    +'<div style="overflow-x:auto">'+monthlyTotals()+'</div>'
    +'</div>'

    // Wholesaler FCST
    +'<div class="card" style="margin-bottom:18px">'
    +'<div class="card-title">\ud83c\udfe2 Wholesaler FCST <span style="font-size:12px;color:var(--muted);font-weight:400;margin-left:6px">Branches with FCST only</span></div>'
    +wsBranchFcstRows()
    +'</div>'

    // Retailer + Distributor FCST
    +'<div class="card" style="margin-bottom:18px">'
    +'<div class="card-title">\ud83d\uded2 Retailer + \ud83d\udce6 Distributor FCST</div>'
    +channelFcstRows()
    +'</div>';
}

function renderOverview() {

  function tv(v){return '\u00a3'+Math.round(v).toLocaleString();}
  function aCol(a,b){return a>=b?'var(--green)':a>=b*0.6?'var(--orange)':'var(--red)';}
  function kpiTile(lbl,kpi,act,kc){

      +'<span style="color:var(--muted);font-size:12px">/</span>'
      +'<span style="font-family:DM Mono,monospace;font-size:16px;font-weight:700;color:'+c+'">'+act+'</span>'
      +'</div><div style="font-size:10px;color:'+c+';margin-top:2px">'+pv+'%</div></div>';
  }
  // Company EV totals
  const evAnnKpi=(KPI_ANNUAL.Simon||0)+(KPI_ANNUAL.Mudassar||0)+(KPI_ANNUAL.Simon_Retailer||0)+(KPI_ANNUAL.Simon_Distributor||0);
  const evMtdKpi=(KPI_DATA.Simon_Wholesaler[MK[mIdx]]||0)+(KPI_DATA.Mudassar[MK[mIdx]]||0)+(KPI_DATA.Simon_Retailer[MK[mIdx]]||0)+(KPI_DATA.Simon_Distributor[MK[mIdx]]||0);
  function repOrders(rep,mo){return STATE.branches.filter(b=>b['Humax Sales Rep']===rep).reduce((s,r)=>s+Number(((r._qty||{})[mo]||{}).order||0),0);}

          <div></div>

          <div style="text-align:center;font-size:10px;font-weight:600;color:var(--orange)">${['Q1','Q2','Q3','Q4'][Math.floor(mIdx/3)]} KPI / QTD</div>
        </div>
        ${fieldRow('Active Branches',fk.brAnn,activeBrY,getFieldKpiQ(rep,'br'),activeBrQ)}
        ${fieldRow('Active Installers',fk.instAnn,instActY,getFieldKpiQ(rep,'inst'),instActY)}
        ${fieldRow('Breakfast Morning',fk.bfAnn,bfY,getFieldKpiQ(rep,'bf'),bfY)}
        ${fieldRow('Vendor Training',fk.vtAnn,vtY,getFieldKpiQ(rep,'vt'),vtY)}

function saveRecord() {
  const { type, idx } = STATE.editTarget;
  const rec = type==='branch' ? STATE.branches[idx] : STATE.installers[idx];
  const keys = type==='branch'
    ? ['Branch','Account','Region','Branch Manager','Phone','Mobile','Last contact date','Follow up date','Notes','Action Plan', ...(STATE.role==='manager'?['Humax Sales Rep']:[])]
    : ['Company','Address','Contact Email','Direct Number','Customer Number','Post Code','Last contact date','Follow up date','Notes','Action Plan', ...(STATE.role==='manager'?['Humax Sales Rep']:[])];
  keys.forEach(k => {
    const el = document.getElementById('mf-'+k);
    if (el) rec[k] = el.value;
  });

  // Save branch events (Visit / Breakfast / Training)
  if (type === 'branch') {
    EVENT_TYPES.forEach(e => {
      const row = document.getElementById(`toggle-${e.key}`);
      const dateEl = document.getElementById(`mf-ev-${e.key}-date`);
      const noteEl = document.getElementById(`mf-ev-${e.key}-note`);
      if (row) {
        rec[`_ev_${e.key}`] = row.classList.contains('checked');
        if (dateEl) rec[`_ev_${e.key}_date`] = dateEl.value;
        if (noteEl) rec[`_ev_${e.key}_note`] = noteEl.value;
      }
    });
  }
  // Save installer activities (Product Listing / Training Session)
  if (type === 'installer') {
    ['product_listing','training_session'].forEach(key => {
      const row = document.getElementById(`inst-toggle-${key}`);
      const dateEl = document.getElementById(`mf-inst-${key}-date`);
      const noteEl = document.getElementById(`mf-inst-${key}-note`);
      if (row) {
        rec[`_inst_${key}`] = row.classList.contains('checked');
        if (dateEl) rec[`_inst_${key}_date`] = dateEl.value;
        if (noteEl) rec[`_inst_${key}_note`] = noteEl.value;
      }
    });
    // _primary_branches is already mutated in-place by addPrimaryBranch/removePrimaryBranch
    if (!rec._primary_branches) rec._primary_branches = [];
  }

  // Save FCST/Order monthly data (EV + STB merged)
  if (!rec._qty) rec._qty = {};
  const months = getRelevantMonths();
  months.forEach(m => {
    const evLines  = (_fcstLines[m]     || []).filter(l => l.model || Number(l.fcst||0)>0 || Number(l.order||0)>0);
    const lines = evLines; // STB managed from STB menu
    const tf = lines.reduce((s,l)=>s+Number(l.fcst||0),0);
    const to = lines.reduce((s,l)=>s+Number(l.order||0),0);
    rec._qty[m] = { lines, fcst: tf, order: to };
  });

  saveData();
  closeModal();
  renderCurrentPage();
  setupNav();
  showToast('✅ Record saved successfully');
}

// ── _renderFcstSummaryForLines: shared table renderer for EV & STB ──────────
function _renderFcstSummaryForLines(month, prefix) {
  var lines = (prefix==='stb' ? (_stbFcstLines[month]||[]) : (_fcstLines[month]||[]));
  var tf = lines.reduce(function(s,l){return s+Number(l.fcst||0);},0);
  var to = lines.reduce(function(s,l){return s+Number(l.order||0);},0);
  var pct = tf>0 ? Math.min(100,Math.round(to/tf*100)) : null;
  var barColor = pct===null?'var(--muted)':pct>=100?'var(--green)':pct>=60?'var(--orange)':'var(--red)';
  if (lines.length===0) return '<div style="font-size:11px;color:var(--muted);padding:4px 0">No lines yet.</div>';
  var rows = lines.map(function(l,idx){
    var lp = Number(l.fcst)>0 ? Math.min(100,Math.round(Number(l.order||0)/Number(l.fcst)*100)) : null;
    var lc = lp===null?'var(--muted)':lp>=100?'var(--green)':lp>=60?'var(--orange)':'var(--red)';
    var rmFn = prefix==='stb' ? 'removeStbFcstLine' : 'removeFcstLine';
    return '<tr style="border-bottom:1px solid var(--border)">'
      +'<td style="padding:4px 6px;font-weight:500">'+(l.model||'—')+'</td>'
      +'<td style="padding:4px 6px;text-align:center;font-family:DM Mono,monospace;color:var(--orange)">'+Number(l.fcst||0).toLocaleString()+'</td>'
      +'<td style="padding:4px 6px;text-align:center;font-family:DM Mono,monospace;color:var(--green)">'+Number(l.order||0).toLocaleString()+'</td>'
      +'<td style="padding:4px 6px;text-align:center;font-family:DM Mono,monospace;color:'+lc+';font-weight:700">'+(lp!==null?lp+'%':'—')+'</td>'
      +'<td style="padding:4px 2px;text-align:center"><button onclick="'+rmFn+'(\''+month+'\','+idx+')" style="background:rgba(239,68,68,.15);border:none;color:var(--red);border-radius:4px;cursor:pointer;font-size:13px;width:22px;height:22px;line-height:1">×</button></td>'
      +'</tr>';
  }).join('');
  return '<div style="overflow-x:auto;margin-bottom:4px"><table style="width:100%;border-collapse:collapse;font-size:12px">'
    +'<thead><tr style="border-bottom:1px solid var(--border)">'
    +'<th style="text-align:left;padding:4px 6px;color:var(--muted);font-weight:500">Model</th>'
    +'<th style="text-align:center;padding:4px 6px;color:var(--orange);font-weight:500">FCST</th>'
    +'<th style="text-align:center;padding:4px 6px;color:var(--green);font-weight:500">ORDER</th>'
    +'<th style="text-align:center;padding:4px 6px;color:var(--muted);font-weight:500">%</th>'
    +'<th style="width:28px"></th></tr></thead>'
    +'<tbody>'+rows+'</tbody>'
    +'<tfoot><tr style="border-top:2px solid var(--border);background:#f0f2f6">'
    +'<td style="padding:5px 6px;font-weight:700;font-size:11px;color:var(--muted2)">TOTAL</td>'
    +'<td style="padding:5px 6px;text-align:center;font-family:DM Mono,monospace;font-weight:700;color:var(--orange)">'+tf.toLocaleString()+'</td>'
    +'<td style="padding:5px 6px;text-align:center;font-family:DM Mono,monospace;font-weight:700;color:var(--green)">'+to.toLocaleString()+'</td>'
    +'<td style="padding:5px 6px;text-align:center;font-family:DM Mono,monospace;font-weight:700;color:'+barColor+'">'+(pct!==null?pct+'%':'—')+'</td>'
    +'<td></td></tr></tfoot></table></div>';
}

window.removeFcstLine = function(month, idx) {
  if (_fcstLines[month]) {
    _fcstLines[month].splice(idx, 1);
    var el = document.getElementById('fcst-summary-'+month);
    if (el) el.innerHTML = _renderFcstSummaryForLines(month,'ev');
  }
};

window.addFcstLine = function(month) {
  // Called for EV section (prefix 'ev')
  var modelEl = document.getElementById('fcst-add-model-'+month);
  var fcstEl  = document.getElementById('fcst-add-fcst-'+month);
  var orderEl = document.getElementById('fcst-add-order-'+month);
  if (!modelEl) return;
  var model = modelEl.value.trim();
  var fcst  = Number(fcstEl?fcstEl.value:0)||0;
  var order = Number(orderEl?orderEl.value:0)||0;
  if (!model) { modelEl.focus(); return; }
  if (!_fcstLines[month]) _fcstLines[month] = [];
  _fcstLines[month].push({ model: model, fcst: fcst, order: order });
  modelEl.value=''; if(fcstEl)fcstEl.value=''; if(orderEl)orderEl.value='';
  var el = document.getElementById('fcst-summary-'+month);
  if (el) el.innerHTML = _renderFcstSummaryForLines(month,'ev');
};

window.saveChannelData = function(month) {
  if (!STATE.channelData) STATE.channelData = {};
  var ecF  = document.getElementById('ec-fcst');
  var ecO  = document.getElementById('ec-order');
  var b2bF = document.getElementById('b2b-fcst');
  var b2bO = document.getElementById('b2b-order');
  // Read ec_lines & b2b_lines from _channelLines
  var ecLines  = (_channelLines['ec_'+month]  || []).filter(function(l){return l.model;});
  var b2bLines = (_channelLines['b2b_'+month] || []).filter(function(l){return l.model;});
  var ecTf  = ecLines.reduce(function(s,l){return s+Number(l.fcst||0);},0);
  var ecTo  = ecLines.reduce(function(s,l){return s+Number(l.order||0);},0);
  var b2bTf = b2bLines.reduce(function(s,l){return s+Number(l.fcst||0);},0);
  var b2bTo = b2bLines.reduce(function(s,l){return s+Number(l.order||0);},0);
  STATE.channelData[month] = {
    ec_fcst:   ecTf  || Number(ecF  ? ecF.value  : 0),
    ec_order:  ecTo  || Number(ecO  ? ecO.value  : 0),
    b2b_fcst:  b2bTf || Number(b2bF ? b2bF.value : 0),
    b2b_order: b2bTo || Number(b2bO ? b2bO.value : 0),
    ec_lines:  ecLines,
    b2b_lines: b2bLines,
  };
  saveData();
  showToast('Channel data saved for '+month);
  renderForecast();
};

function _renderChannelSummary(ch, month) {
  var lines = (_channelLines[ch+'_'+month] || []);
  if (lines.length===0) return '<div style="font-size:11px;color:var(--muted);padding:4px 0">No lines yet. Add models below.</div>';
  var tf=lines.reduce(function(s,l){return s+Number(l.fcst||0);},0);
  var to=lines.reduce(function(s,l){return s+Number(l.order||0);},0);
  var pct=tf?Math.min(100,Math.round(to/tf*100)):null;
  var bc=pct===null?'var(--muted)':pct>=100?'var(--green)':pct>=60?'var(--orange)':'var(--red)';
  var rows=lines.map(function(l,i){
    return '<tr><td style="padding:3px 6px;font-weight:500;font-size:12px">'+l.model+'</td>'
      +'<td style="padding:3px 6px;text-align:center;font-family:DM Mono,monospace;font-size:12px;color:var(--orange)">'+Number(l.fcst||0)+'</td>'
      +'<td style="padding:3px 6px;text-align:center;font-family:DM Mono,monospace;font-size:12px;color:var(--green)">'+Number(l.order||0)+'</td>'
      +'<td style="padding:3px 6px;text-align:center"><button onclick="removeChannelLine(\''+ch+'\',\''+month+'\','+i+')" style="background:rgba(239,68,68,.15);border:none;color:var(--red);border-radius:4px;cursor:pointer;font-size:12px;width:20px;height:20px">×</button></td>'
      +'</tr>';
  }).join('');
  return '<table style="width:100%;border-collapse:collapse;margin-bottom:4px">'
    +'<thead><tr><th style="text-align:left;padding:3px 6px;font-size:10px;color:var(--muted)">Model</th>'
    +'<th style="text-align:center;padding:3px 6px;font-size:10px;color:var(--orange)">FCST</th>'
    +'<th style="text-align:center;padding:3px 6px;font-size:10px;color:var(--green)">ORDER</th>'
    +'<th></th></tr></thead><tbody>'+rows+'</tbody>'
    +'<tfoot><tr style="border-top:1px solid var(--border)">'
    +'<td style="padding:3px 6px;font-size:11px;font-weight:700;color:var(--muted2)">Total</td>'
    +'<td style="padding:3px 6px;text-align:center;font-family:DM Mono,monospace;font-weight:700;font-size:12px;color:var(--orange)">'+tf+'</td>'
    +'<td style="padding:3px 6px;text-align:center;font-family:DM Mono,monospace;font-weight:700;font-size:12px;color:var(--green)">'+to+'</td>'
    +'<td style="padding:3px 6px;text-align:center;font-size:12px;font-weight:700;color:'+bc+'">'+(pct!==null?pct+'%':'—')+'</td>'
    +'</tr></tfoot></table>';
}

// ── qtyCell: render FCST/Order summary in table ────────────────────────────
function qtyCell(rec) {
  var m = STATE.fcstMonth;
  var q = (rec._qty || {})[m] || {};
  var fcst  = (q.fcst  !== undefined && q.fcst  !== '') ? Number(q.fcst)  : null;
  var order = (q.order !== undefined && q.order !== '') ? Number(q.order) : null;
  var lines = Array.isArray(q.lines) ? q.lines.filter(function(l){return l.model;}) : [];
  var pct   = (fcst && order) ? Math.min(100, Math.round(order/fcst*100)) : null;
  var barColor = pct===null?'var(--muted)':pct>=100?'var(--green)':pct>=60?'var(--orange)':'var(--red)';
  if (fcst===null && order===null) return '<span style="color:var(--muted);font-size:11px">—</span>';
  var modelLines = lines.length>0 ? lines.map(function(l){
    return '<div style="font-size:10px;color:var(--teal);font-weight:600;margin-bottom:1px">'+l.model+' <span style="color:var(--muted);font-weight:400">F:'+Number(l.fcst||0)+' O:'+Number(l.order||0)+'</span></div>';
  }).join('') : '';
  return '<div class="qty-cell">'
    + modelLines
    + '<div class="qty-row"><span class="qty-label">FCST</span><span class="qty-val fcst '+(fcst===null?'empty':'')+'">'+( fcst!==null?fcst.toLocaleString():'—')+'</span></div>'
    + '<div class="qty-row"><span class="qty-label">ORDER</span><span class="qty-val order '+(order===null?'empty':'')+'">'+( order!==null?order.toLocaleString():'—')+'</span></div>'
    + (pct!==null?'<div class="attain-bar"><div class="attain-fill" style="width:'+pct+'%;background:'+barColor+'"></div></div>':'')
    + '</div>';
}

function fcstModalFields(rec) {
  var months = getRelevantMonths();
  var isSimon = (STATE.user === 'Simon' && STATE.role !== 'manager');
  _fcstLines = {}; _stbFcstLines = {};
  months.forEach(function(m) {
    var q = (rec._qty || {})[m];
    _fcstLines[m] = []; _stbFcstLines[m] = [];
    if (!q) return;
    var rawLines = Array.isArray(q.lines) && q.lines.length>0
      ? q.lines
      : ((q.model||Number(q.fcst||0)||Number(q.order||0)) ? [{model:q.model||'',fcst:q.fcst||0,order:q.order||0}] : []);
    rawLines.forEach(function(l){
      // STB is managed from STB menu; only EV lines in Wholesaler modal
      if (STB_MODELS.indexOf(l.model)<0) _fcstLines[m].push(Object.assign({},l));
    });
  });

  return months.map(function(m) {
    var isCur = (m === new Date().toISOString().slice(0,7));
    var evLines = _fcstLines[m]||[];
    var stbLines = _stbFcstLines[m]||[];
    var evTf=evLines.reduce(function(s,l){return s+Number(l.fcst||0);},0);
    var evTo=evLines.reduce(function(s,l){return s+Number(l.order||0);},0);
    var stbTf=stbLines.reduce(function(s,l){return s+Number(l.fcst||0);},0);
    var stbTo=stbLines.reduce(function(s,l){return s+Number(l.order||0);},0);
    var hdr=[];
    if(evTf||evTo) hdr.push('EV F:<span style="color:var(--orange);font-weight:600">'+evTf+'</span> O:<span style="color:var(--green);font-weight:600">'+evTo+'</span>');
    var borderStyle = isCur
      ? 'border:1px solid rgba(0,197,163,.4);border-radius:12px;padding:14px;background:rgba(0,197,163,.04);margin-bottom:12px'
      : 'border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px';
    var stbSection = '';
    return '<div style="'+borderStyle+'">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'
      +'<div style="font-weight:700;font-size:14px;color:'+(isCur?'var(--teal)':'var(--text)')+'">'+monthLabel(m)+(isCur?' ★':'')+'</div>'
      +(hdr.length?'<div style="font-size:11px;color:var(--muted)">'+hdr.join(' | ')+'</div>':'')+'</div>'
      +'<div style="font-size:11px;font-weight:700;color:var(--teal);margin-bottom:4px">⚡ EV Chargers</div>'
      +'<div id="fcst-summary-'+m+'">'+_renderFcstSummaryForLines(m,'ev')+'</div>'
      +'<div style="display:grid;grid-template-columns:1fr 80px 80px auto;gap:6px;align-items:end;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">'
      +'<div><div style="font-size:10px;color:var(--muted2);margin-bottom:3px">MODEL</div>'
      +'<select id="fcst-add-model-'+m+'" style="width:100%;padding:6px 8px;background:#f0f2f6;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;font-family:Inter,sans-serif;outline:none">'+_evModelOpts()+'</select></div>'
      +'<div><div style="font-size:10px;color:var(--orange);margin-bottom:3px">FCST</div>'
      +'<input id="fcst-add-fcst-'+m+'" type="number" min="0" placeholder="0" style="width:100%;padding:6px 8px;background:#f0f2f6;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;font-family:DM Mono,monospace;outline:none;text-align:right"></div>'
      +'<div><div style="font-size:10px;color:var(--green);margin-bottom:3px">ORDER</div>'
      +'<input id="fcst-add-order-'+m+'" type="number" min="0" placeholder="0" style="width:100%;padding:6px 8px;background:#f0f2f6;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;font-family:DM Mono,monospace;outline:none;text-align:right"></div>'
      +'<div><div style="font-size:10px;color:transparent;margin-bottom:3px">.</div>'
      +'<button onclick="addFcstLine(\''+m+'\')" style="padding:6px 12px;background:var(--teal);border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;height:32px">+ Add</button></div>'
      +'</div>'
      +stbSection
      +'</div>';
  }).join('');
}
function showToast(msg, isError=false) {
  const t = document.createElement('div');
  t.className = 'toast' + (isError?' error':'');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}

// ── KPI cell change handler ────────────────────────────────────────────────────
function kpiCellChange(seg, monthKey, val) {
  var v = Math.max(0, parseInt(val)||0);
  if (!KPI_DATA[seg]) KPI_DATA[seg] = {};
  KPI_DATA[seg][monthKey] = v;
  // Update annual total cell
  var ann = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'].reduce(function(s,k){return s+(KPI_DATA[seg][k]||0);},0);
  KPI_DATA[seg].total = ann;
  KPI_ANNUAL[seg] = ann;
  // Sync Simon KPI_ANNUAL (wholesaler = Simon_Wholesaler)
  if (seg==='Simon_Wholesaler') { KPI_DATA.Simon = KPI_DATA.Simon_Wholesaler; KPI_ANNUAL.Simon = KPI_ANNUAL.Simon_Wholesaler; }
  var annEl = document.getElementById('kpi-ann-'+seg);
  if (annEl) annEl.textContent = ann.toLocaleString();
}

// ── Field KPI change handler ───────────────────────────────────────────────────
function fieldKpiChange(rep, key, val) {
  var v = Math.max(0, parseInt(val)||0);
  if (!STATE._fieldKpi) STATE._fieldKpi = {};
  if (!STATE._fieldKpi[rep]) STATE._fieldKpi[rep] = Object.assign({}, DEFAULT_FIELD_KPI[rep]||{});
  STATE._fieldKpi[rep][key] = v;
}

function renderPricing() {
  if (STATE.role !== 'manager') return;
  const el = document.getElementById('page-pricing');
  if (!el) return;

  // Compute live turnover impact across all branch records
  function liveTO(key, price) {
    let qty = 0;
    STATE.branches.forEach(b => {
      Object.values(b._qty || {}).forEach(mo => {
        (mo.lines || []).forEach(l => { if (l.model === key) qty += Number(l.order || 0); });
      });
    });
    STATE.installers.forEach(i => {
      Object.values(i._qty || {}).forEach(mo => {
        (mo.lines || []).forEach(l => { if (l.model === key) qty += Number(l.order || 0); });
      });
    });
    return { qty, to: qty * price };
  }

  // Total PO turnover at current prices
  function totalTO() {
    let t = 0;
    STATE.branches.forEach(b => {
      Object.values(b._qty || {}).forEach(mo => { t += calcTurnover(mo.lines); });
    });
    return t;
  }

  const grandTO = totalTO();
  const tv = v => '\u00a3' + Math.round(v).toLocaleString();
  const isChanged = key => PRICING[key] !== PRICING_DEFAULTS[key];
  const anyChanged = Object.keys(PRICING_DEFAULTS).some(isChanged);

  const groupCards = PRICING_GROUPS.map(grp => {
    const rows = grp.items.map(item => {
      const cur = PRICING[item.key] || 0;
      const def = PRICING_DEFAULTS[item.key] || 0;
      const { qty, to } = liveTO(item.key, cur);
      const changed = cur !== def;
      return `<tr style="border-bottom:1px solid var(--border);${changed?'background:rgba(0,197,163,.04)':''}">

        <div class="stat-value">${Object.keys(PRICING).length}</div>

    <div style="display:flex;gap:10px;margin-bottom:20px;align-items:center;flex-wrap:wrap">
      <button onclick="savePricing()"

window.updatePricePreview = function(key, val) {
  const newPrice = Number(val) || 0;
  // Temporarily update PRICING for live preview
  PRICING[key] = newPrice;
  const safeKey = key.replace(/ /g, '_');
  // Recalc this model's qty/TO
  let qty = 0;
  STATE.branches.forEach(b => {
    Object.values(b._qty || {}).forEach(mo => {
      (mo.lines || []).forEach(l => { if (l.model === key) qty += Number(l.order || 0); });
    });
  });
  const to = qty * newPrice;
  const tv = v => '\u00a3' + Math.round(v).toLocaleString();
  const toEl = document.getElementById('price-to-' + safeKey);
  const qtyEl = document.getElementById('price-qty-' + safeKey);
  if (toEl) { toEl.textContent = tv(to); toEl.style.color = qty > 0 ? 'var(--teal)' : 'var(--muted)'; }
  if (qtyEl) qtyEl.textContent = qty.toLocaleString();
  // Update input colour
  const inp = document.getElementById('price-' + safeKey);
  const def = PRICING_DEFAULTS[key] || 0;
  if (inp) inp.style.color = newPrice !== def ? 'var(--teal)' : 'var(--text)';
  // Update grand total
  let grandTO = 0;
  STATE.branches.forEach(b => {
    Object.values(b._qty || {}).forEach(mo => { grandTO += calcTurnover(mo.lines); });
  });
  const grandEl = document.getElementById('grand-ev-to');
  if (grandEl) grandEl.textContent = tv(grandTO);
};

window.savePricing = function() {
  // Read all inputs and commit to PRICING
  PRICING_GROUPS.forEach(grp => {
    grp.items.forEach(item => {
      const inp = document.getElementById('price-' + item.key.replace(/ /g, '_'));
      if (inp) PRICING[item.key] = Number(inp.value) || 0;
    });
  });
  saveData();
  showToast('\u2705 Prices saved — Turnover updated across all records');
  renderPricing();
};

window.resetPricing = function() {
  Object.keys(PRICING_DEFAULTS).forEach(k => { PRICING[k] = PRICING_DEFAULTS[k]; });
  saveData();
  showToast('\u21ba Prices reset to defaults');
  renderPricing();
};

// ── GAS Script code ───────────────────────────────────────────────────────────
var WM_GAS_SCRIPT=[
  "// Humax Wholesaler CRM - Google Apps Script",
  "// Deploy as Web App: Execute as Me, Access: Anyone",
  "const SHEET_NAME = 'CRM_Data';",
  "function doGet(e) {",
  "  if(e.parameter.action==='ping') return json({ok:true,ts:new Date().toISOString()});",
  "  if(e.parameter.action==='read') {",
  "    var sh=getOrCreate(),data=sh.getDataRange().getValues();",
  "    if(data.length<2) return json({ok:true,payload:{}});",
  "    try{return json({ok:true,payload:JSON.parse(data[1][0])});}",
  "    catch(e){return json({ok:false,error:'parse error'});}",
  "  }",
  "  return json({ok:false,error:'unknown'});",
  "}",
  "function doPost(e) {",
  "  var body;",
  "  try{body=JSON.parse(e.postData.contents);}catch(x){return json({ok:false,error:'bad json'});}",
  "  if(body.action==='write') {",
  "    var sh=getOrCreate();",
  "    sh.clearContents();",
  "    sh.getRange(1,1).setValue('crm_payload');",
  "    sh.getRange(2,1).setValue(JSON.stringify(body.payload));",
  "    return json({ok:true,ts:new Date().toISOString()});",
  "  }",
  "  return json({ok:false,error:'unknown'});",
  "}",
  "function getOrCreate() {",
  "  var ss=SpreadsheetApp.getActiveSpreadsheet(),sh=ss.getSheetByName(SHEET_NAME);",
  "  if(!sh){sh=ss.insertSheet(SHEET_NAME);sh.getRange(1,1).setValue('crm_payload');",
  "    sh.getRange(1,1).setFontWeight('bold').setBackground('#0a2342').setFontColor('#ffffff');",
  "    sh.setColumnWidth(1,600);}",
  "  return sh;",
  "}",
  "function json(obj){return ContentService.createTextOutput(JSON.stringify(obj)).setMimeType(ContentService.MimeType.JSON);}"
].join("\n");

window.wmTest=async function(){

  // Validate it's a Web App URL, not a Spreadsheet URL
  if(url && url.includes('docs.google.com/spreadsheets')){
    var res=document.getElementById('wm-test-result');
    if(res){res.style.display='block';res.textContent='\u2717 This looks like a Spreadsheet URL. Please enter the Apps Script Web App URL (from Deploy > New deployment).';res.style.background='rgba(239,68,68,.1)';res.style.border='1px solid rgba(239,68,68,.3)';res.style.color='var(--red)';}
    showToast('Wrong URL — use the Apps Script Web App URL');return;
  }
  if(!url){showToast('Enter the Apps Script URL first');return;}
  var res=document.getElementById('wm-test-result');
  if(res){res.style.display='block';res.textContent='Testing\u2026';res.style.background='rgba(245,158,11,.1)';res.style.border='1px solid rgba(245,158,11,.3)';res.style.color='var(--orange)';}
  try{
    var r=await fetch(url+'?action=ping',{mode:'cors'});
    var d=await r.json();
    if(d.ok){if(res){res.textContent='\u2713 Connected: '+d.ts;res.style.background='rgba(16,185,129,.1)';res.style.border='1px solid rgba(16,185,129,.3)';res.style.color='var(--green)';}showToast('\u2713 Connection OK');}

};

window.wmPull=async function(){

      var p=d.payload;
      STATE.branches=p.branches||STATE.branches;STATE.installers=p.installers||STATE.installers;
      STATE.channelData=p.channelData||{};STATE.weeklyData=p.weeklyData||{};STATE.weeklyChannelData=p.weeklyChannelData||{};

      if(p.kpiData)KPI_DATA=p.kpiData;if(p.kpiAnnual)KPI_ANNUAL=p.kpiAnnual;if(p.fieldKpi)STATE._fieldKpi=p.fieldKpi;
      showToast('\u2713 Data pulled from Sheets');renderCurrentPage();

function wmBuildAndDownload(){
  var EV_MODS=HUMAX_MODELS.filter(function(g){return g.group!=='STB';}).flatMap(function(g){return g.items;});
  var MONTHS=['2026-01','2026-02','2026-03','2026-04','2026-05','2026-06','2026-07','2026-08','2026-09','2026-10','2026-11','2026-12'];
  var MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  var wb=XLSX.utils.book_new();

  // ── Sheet 1: Events (Branch Visit, Breakfast Morning, Training Day) ────────
  var evHdr=['Account','Branch','Region','Sales Rep','Branch Manager','Phone','Branch Visit Date','Breakfast Morning Date','Training Day Date','Last Contact Date','Follow Up Date','Notes','Action Plan'];
  var evRows=[evHdr];
  STATE.branches.forEach(function(b){
    evRows.push([
      b['Account']||'',b['Branch']||'',b['Region']||'',b['Humax Sales Rep']||'',
      b['Branch Manager']||'',b['Phone']||'',
      b['_ev_visit_date']||'',b['_ev_breakfast_date']||'',b['_ev_training_date']||'',
      b['Last contact date']||'',b['Follow up date']||'',
      b['Notes']||'',b['Action Plan']||''
    ]);
  });
  var wsEv=XLSX.utils.aoa_to_sheet(evRows);
  wsEv['!cols']=[{wch:10},{wch:22},{wch:14},{wch:10},{wch:20},{wch:14},{wch:16},{wch:18},{wch:14},{wch:14},{wch:14},{wch:30},{wch:30}];
  XLSX.utils.book_append_sheet(wb,wsEv,'Events');

  // ── Sheets per model: FCST & Order by month ────────────────────────────────
  EV_MODS.forEach(function(model){
    var hdr=['Account','Branch','Region','Sales Rep'];
    MONTHS.forEach(function(m,i){hdr.push(MN[i]+' FCST');hdr.push(MN[i]+' Order');});
    hdr.push('Total FCST','Total Order');
    var rows=[hdr];
    STATE.branches.forEach(function(b){
      var row=[b['Account']||'',b['Branch']||'',b['Region']||'',b['Humax Sales Rep']||''];
      var tFcst=0,tOrder=0;
      MONTHS.forEach(function(m){
        var qty=(b._qty||{})[m]||{};
        var lines=Array.isArray(qty.lines)?qty.lines:[];
        var line=lines.find(function(l){return l.model===model;})||{};
        var f=Number(line.fcst||0),o=Number(line.order||0);
        row.push(f||'');row.push(o||'');
        tFcst+=f;tOrder+=o;
      });
      row.push(tFcst||'');row.push(tOrder||'');
      rows.push(row);
    });
    // Add totals row
    var tot=['','','','TOTAL'];
    var nBranches=STATE.branches.length;
    for(var ci=4;ci<hdr.length-2;ci++){
      var col=XLSX.utils.encode_col(ci);
      tot.push('=SUM('+col+'2:'+col+(nBranches+1)+')');
    }
    var lci=hdr.length-2;
    tot.push('=SUM('+XLSX.utils.encode_col(lci)+'2:'+XLSX.utils.encode_col(lci)+(nBranches+1)+')');
    var lci2=hdr.length-1;
    tot.push('=SUM('+XLSX.utils.encode_col(lci2)+'2:'+XLSX.utils.encode_col(lci2)+(nBranches+1)+')');
    rows.push(tot);
    var ws=XLSX.utils.aoa_to_sheet(rows);
    // Style: freeze first row, set col widths
    ws['!cols']=[{wch:10},{wch:22},{wch:14},{wch:10}];
    for(var i=0;i<24;i++)ws['!cols'].push({wch:8});
    ws['!cols'].push({wch:10},{wch:10});
    ws['!freeze']={xSplit:4,ySplit:1};
    // Shorten sheet name to <=31 chars
    var sname=model.length>31?model.substring(0,31):model;
    XLSX.utils.book_append_sheet(wb,ws,sname);
  });

  // ── Sheet: Combined FCST+Order summary ───────────────────────────────────
  var sumHdr=['Account','Branch','Region','Sales Rep'];
  MONTHS.forEach(function(m,i){sumHdr.push(MN[i]+' Total FCST');sumHdr.push(MN[i]+' Total Order');});
  sumHdr.push('Annual FCST','Annual Order');
  var sumRows=[sumHdr];
  STATE.branches.forEach(function(b){
    var row=[b['Account']||'',b['Branch']||'',b['Region']||'',b['Humax Sales Rep']||''];
    var aF=0,aO=0;
    MONTHS.forEach(function(m){
      var qty=(b._qty||{})[m]||{};
      var lines=Array.isArray(qty.lines)?qty.lines:[];
      var f=lines.filter(function(l){return EV_MODS.indexOf(l.model)>=0;}).reduce(function(s,l){return s+Number(l.fcst||0);},0);
      var o=lines.filter(function(l){return EV_MODS.indexOf(l.model)>=0;}).reduce(function(s,l){return s+Number(l.order||0);},0);
      row.push(f||'');row.push(o||'');aF+=f;aO+=o;
    });
    row.push(aF||'');row.push(aO||'');
    sumRows.push(row);
  });
  var wsSummary=XLSX.utils.aoa_to_sheet(sumRows);
  wsSummary['!cols']=[{wch:10},{wch:22},{wch:14},{wch:10}];
  for(var i=0;i<24;i++)wsSummary['!cols'].push({wch:12});
  wsSummary['!cols'].push({wch:12},{wch:12});
  XLSX.utils.book_append_sheet(wb,wsSummary,'Summary');

  XLSX.writeFile(wb,'Humax_Wholesaler_'+new Date().toISOString().slice(0,10)+'.xlsx');
  showToast('\u2713 Excel downloaded');
}

// ── Excel Upload ──────────────────────────────────────────────────────────────
window.wmUpload=function(event){
  var file=event.target.files[0];if(!file) return;
  if(typeof XLSX==='undefined'){
    showToast('Loading Excel library\u2026');
    var s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=function(){wmParseUpload(file);};document.head.appendChild(s);
  }else{wmParseUpload(file);}
  event.target.value='';
};

function wmParseUpload(file){
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array'});
      var updated=0,errors=[];

      // ── Parse Events sheet ─────────────────────────────────────────────────
      if(wb.SheetNames.indexOf('Events')>=0){
        var wsEv=wb.Sheets['Events'];
        var evData=XLSX.utils.sheet_to_json(wsEv,{defval:''});
        evData.forEach(function(row){
          var branch=String(row['Branch']||'').trim();
          var account=String(row['Account']||'').trim();
          var b=STATE.branches.find(function(x){
            return x['Branch']===branch&&(x['Account']===account||!account);
          });
          if(!b){errors.push('Branch not found: '+branch);return;}
          if(row['Branch Visit Date'])    b['_ev_visit_date']    =String(row['Branch Visit Date']);
          if(row['Breakfast Morning Date'])b['_ev_breakfast_date']=String(row['Breakfast Morning Date']);
          if(row['Training Day Date'])    b['_ev_training_date'] =String(row['Training Day Date']);
          if(row['Last Contact Date'])    b['Last contact date'] =String(row['Last Contact Date']);
          if(row['Follow Up Date'])       b['Follow up date']    =String(row['Follow Up Date']);
          if(row['Notes']!==undefined&&row['Notes']!=='')   b['Notes']=String(row['Notes']);
          if(row['Action Plan']!==undefined&&row['Action Plan']!=='') b['Action Plan']=String(row['Action Plan']);
          updated++;
        });
      }

      // ── Parse model sheets ─────────────────────────────────────────────────
      var EV_MODS=HUMAX_MODELS.filter(function(g){return g.group!=='STB';}).flatMap(function(g){return g.items;});
      var MONTHS=['2026-01','2026-02','2026-03','2026-04','2026-05','2026-06','2026-07','2026-08','2026-09','2026-10','2026-11','2026-12'];
      var MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

      EV_MODS.forEach(function(model){
        var sname=model.length>31?model.substring(0,31):model;
        if(wb.SheetNames.indexOf(sname)<0) return;
        var ws=wb.Sheets[sname];
        var data=XLSX.utils.sheet_to_json(ws,{defval:''});
        data.forEach(function(row){
          if(String(row['Branch']||'').trim()==='TOTAL') return;
          var branch=String(row['Branch']||'').trim();
          var account=String(row['Account']||'').trim();
          var b=STATE.branches.find(function(x){
            return x['Branch']===branch&&(x['Account']===account||!account);
          });
          if(!b) return;
          if(!b._qty) b._qty={};
          MONTHS.forEach(function(m,i){
            var mn=MN[i];
            var fVal=Number(row[mn+' FCST']||0);
            var oVal=Number(row[mn+' Order']||0);
            if(fVal===0&&oVal===0) return;
            if(!b._qty[m]) b._qty[m]={lines:[],fcst:0,order:0};
            var lines=b._qty[m].lines||[];
            var existLine=lines.find(function(l){return l.model===model;});
            if(existLine){existLine.fcst=fVal;existLine.order=oVal;}
            else{lines.push({model:model,fcst:fVal,order:oVal});b._qty[m].lines=lines;}
            // Recalc totals
            b._qty[m].fcst=lines.reduce(function(s,l){return s+Number(l.fcst||0);},0);
            b._qty[m].order=lines.reduce(function(s,l){return s+Number(l.order||0);},0);
          });
          updated++;
        });
      });

      saveData();
      var st=document.getElementById('wm-upload-status');
      if(st){
        st.style.display='block';
        if(errors.length===0){
          st.style.background='rgba(16,185,129,.1)';st.style.border='1px solid rgba(16,185,129,.3)';st.style.color='var(--green)';
          st.textContent='\u2713 Uploaded successfully. '+updated+' records updated.';
        }else{
          st.style.background='rgba(245,158,11,.1)';st.style.border='1px solid rgba(245,158,11,.3)';st.style.color='var(--orange)';
          st.textContent='\u26a0 Updated '+updated+' records. Warnings: '+errors.slice(0,3).join('; ')+(errors.length>3?'...':'');
        }
      }
      showToast('\u2713 Excel data imported ('+updated+' records)');
      renderCurrentPage();
    }catch(err){
      showToast('Upload failed: '+err.message);
      var st=document.getElementById('wm-upload-status');
      if(st){st.style.display='block';st.style.background='rgba(239,68,68,.1)';st.style.border='1px solid rgba(239,68,68,.3)';st.style.color='var(--red)';st.textContent='\u2717 Error: '+err.message;}
    }
  };
  reader.readAsArrayBuffer(file);
}
